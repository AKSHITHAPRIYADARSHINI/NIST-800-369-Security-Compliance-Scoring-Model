steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nist-compliance-scorer:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nist-compliance-scorer:$SHORT_SHA'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nist-compliance-scorer'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/nist-compliance-scorer:$SHORT_SHA'
      - '--location=us-central1'

images:
  - 'gcr.io/$PROJECT_ID/nist-compliance-scorer:latest'
  - 'gcr.io/$PROJECT_ID/nist-compliance-scorer:$SHORT_SHA'
